<head>
    <title>JavaScript Games</title>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="CSS/style.css">

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-md navbar-dark bg-dark p-2">

    <a class="navbar-brand" href="index.html">WebDev</a>

    <div class="navbar-nav">

        <a class="nav-link" href="index.html">Home</a>
        <a class="nav-link active" href="games.html">Games</a>
        <a class="nav-link" href="script.html">JavaScript</a>

    </div>

</nav>

<!-- TITLE -->
<main class="container mt-4">

    <h1 class="text-center">JavaScript Games</h1>

    <p class="text-center">
        Click the buttons to play the games!
    </p>

    <div class="row text-center mt-4">

        <!-- GUESSING GAME -->
        <div class="col-md-4 bg-warning p-4">

            <h3>Guessing Game</h3>

            <button class="btn btn-dark" onclick="guessNumber()">
                Play Game
            </button>

        </div>

        <!-- REACTION GAME -->
        <div class="col-md-4 bg-info p-4">

            <h3>Reaction Game</h3>

            <button class="btn btn-dark" onclick="reactionGame()">
                Start Game
            </button>

        </div>

        <!-- ROCK PAPER SCISSORS -->
        <div class="col-md-4 bg-success p-4">

            <h3>Rock Paper Scissors</h3>

            <button class="btn btn-dark" onclick="rps()">
                Play Now
            </button>

        </div>

    </div>

</main>

<!-- JAVASCRIPT -->
<script>

    // GUESSING GAME
    function guessNumber() {

        let random = Math.floor(Math.random() * 10) + 1;

        let guess = prompt("Guess a number between 1 and 10");

        if (guess == random) {
            alert("Correct! You win!");
        } else {
            alert("Wrong! The number was " + random);
        }

    }

    // REACTION GAME
    function reactionGame() {

        let start = Date.now();

        alert("Click OK as fast as you can!");

        let end = Date.now();

        let time = (end - start) / 1000;

        alert("Your reaction time is " + time + " seconds");

    }

    // ROCK PAPER SCISSORS
    function rps() {

        let choices = ["rock", "paper", "scissors"];

        let user = prompt("rock, paper, or scissors?");

        let computer = choices[Math.floor(Math.random() * 3)];

        if (user == computer) {
            alert("Tie! Computer chose " + computer);
        } 
        else if (
            (user == "rock" && computer == "scissors") ||
            (user == "paper" && computer == "rock") ||
            (user == "scissors" && computer == "paper")
        ) {
            alert("You win! Computer chose " + computer);
        } 
        else {
            alert("You lose! Computer chose " + computer);
        }

    }

</script>

</body>
</html>
