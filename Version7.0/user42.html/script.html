<!DOCTYPE html>
<html lang="en">

<head>
    <title>JavaScript</title>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="CSS/style.css">

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-md navbar-dark bg-dark p-2">
    <a class="navbar-brand" href="index.html">WebDev</a>

    <div class="navbar-nav">
        <a class="nav-link" href="index.html">Home</a>
        <a class="nav-link" href="games.html">Games</a>
        <a class="nav-link active" href="script.html">JavaScript</a>
    </div>
</nav>

<!-- TITLE -->
<div class="container mt-3">
    <h1>My JavaScript Examples</h1>
</div>

<!-- TOP BUTTONS -->
<div class="container mt-3">
    <div class="row">

        <div class="col-md-4 text-center bg-warning p-3">
            <h3>Alert</h3>
            <button class="btn btn-dark" onclick="showAlert()">Click Me</button>
        </div>

        <div class="col-md-4 text-center bg-info p-3">
            <h3>Date</h3>
            <button class="btn btn-dark" onclick="showDate()">Show Date</button>
            <p id="date"></p>
        </div>

        <div class="col-md-4 text-center bg-success p-3">
            <h3>Color Change</h3>
            <button class="btn btn-dark" onclick="changeColor()">Change Background</button>
        </div>

    </div>
</div>

<hr>

<!-- LIST SECTION -->
<div class="container">
    <div class="row">

        <!-- SHOPPING LIST -->
        <div class="col-md-6">
            <h3>Shopping List</h3>

            <input type="text" id="item" placeholder="Enter item">
            <button class="btn btn-primary" onclick="addItem()">Add</button>

            <ul id="shoppingList"></ul>
        </div>

        <!-- FOOD LIST -->
        <div class="col-md-6">
            <h3>Food List</h3>

            <ol id="foodList">
                <li>Pizza</li>
                <li>Burgers</li>
                <li>Tacos</li>
                <li>Fries</li>
            </ol>

            <button class="btn btn-danger" onclick="changeFirst()">Change First</button>
            <button class="btn btn-info" onclick="changeAll()">Change All</button>
        </div>

    </div>
</div>

<!-- JAVASCRIPT -->
<script>

    // ALERT FUNCTION
    function showAlert() {
        alert("Go Sabers!");
    }

    // DATE FUNCTION
    function showDate() {
        document.getElementById("date").innerHTML = Date();
    }

    // BACKGROUND COLOR FUNCTION
    function changeColor() {
        document.body.style.backgroundColor = "lightblue";
    }

    // ADD ITEM FUNCTION
    function addItem() {

        let input = document.getElementById("item");

        if (input.value === "") return;

        let li = document.createElement("li");
        li.textContent = input.value;

        document.getElementById("shoppingList").appendChild(li);

        input.value = "";
    }

    // CHANGE FIRST ITEM
    function changeFirst() {
        document.querySelector("#foodList li").style.backgroundColor = "red";
    }

    // CHANGE ALL ITEMS (LOOP)
    function changeAll() {

        let items = document.querySelectorAll("#foodList li");

        for (let i = 0; i < items.length; i++) {
            items[i].style.backgroundColor = "yellow";
        }
    }

</script>

</body>
</html>
